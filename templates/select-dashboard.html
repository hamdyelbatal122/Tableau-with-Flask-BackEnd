<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Select Dashboard - Professional Analytics Platform">
    <title>Select Dashboard</title>
    <link rel="shortcut icon" type="image/png" href="../static/favicon.ico">
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/dashboard.css">
</head>

<body>
    <!-- Page Container -->
    <div class="page-container">
        <!-- Header -->
        <div class="page-header">
            <div class="header-top">
                <h1 class="header-title">📊 Analytics Dashboard</h1>
                <div class="header-actions">
                    <button class="header-btn secondary" id="themeToggleBtn" title="Toggle dark mode">
                        🌙 Dark Mode
                    </button>
                    <a href="/profile" class="header-btn secondary">
                        👤 Profile
                    </a>
                    <a href="/logout" class="header-btn">
                        Logout
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- Page Title Area -->
                <div class="page-title-area">
                    <h2 class="page-title">Select Your Dashboard</h2>
                    <p class="page-subtitle">Choose from your favorite dashboards or browse all available dashboards</p>
                </div>

                <!-- Search and Filter Area -->
                <div class="search-filter-area">
                    <div class="search-box">
                        <input 
                            type="text" 
                            id="dashboardSearch" 
                            placeholder="Search dashboards..."
                            autocomplete="off"
                        >
                    </div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All Dashboards</button>
                        <button class="filter-btn" data-filter="favorites">Favorites</button>
                        <button class="filter-btn" data-filter="recent">Recently Viewed</button>
                    </div>
                </div>

                <!-- Favorites Section -->
                <div id="favoritesContainer" class="hidden">
                    <h3 class="favorites-title">⭐ Your Favorites</h3>
                    <div class="dashboard-grid" id="favoritesGrid">
                        <!-- Favorites will be populated here -->
                    </div>
                </div>

                <!-- All Dashboards Section -->
                <div id="allDashboardsContainer">
                    <div class="dashboard-grid" id="dashboardsGrid">
                        <!-- Dashboards will be populated here -->
                        <div class="grid-message grid-message-muted">
                            <p class="grid-message-text">Loading dashboards...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="page-footer">
            <p>&copy; 2024 Professional Analytics Dashboard. All rights reserved. | v2.0</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../static/js/jquery-3.4.1.min.js"></script>
    <script src="../static/js/bootstrap.min.js"></script>
    <script>
        // Dark Mode Toggle
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const body = document.body;

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
                themeToggleBtn.textContent = '☀️ Light Mode';
            } else {
                body.classList.remove('dark-mode');
                themeToggleBtn.textContent = '🌙 Dark Mode';
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDarkMode = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            loadTheme();
        });

        // Search and Filter
        const dashboardSearch = document.getElementById('dashboardSearch');
        const filterButtons = document.querySelectorAll('.filter-btn');
        let currentFilter = 'all';
        let allDashboards = [];
        let favoriteDashboards = [];

        // Fetch dashboards
        async function fetchDashboards() {
            try {
                const response = await fetch('/api/dashboards');
                if (response.ok) {
                    const data = await response.json();
                    allDashboards = data.dashboards || [];
                    favoriteDashboards = data.favorites || [];
                    renderDashboards();
                } else {
                    console.error('Failed to fetch dashboards');
                    showError('Failed to load dashboards');
                }
            } catch (error) {
                console.error('Error fetching dashboards:', error);
                showError('Error loading dashboards');
            }
        }

        function renderDashboards() {
            const grid = document.getElementById('dashboardsGrid');
            const favGrid = document.getElementById('favoritesGrid');
            let filteredDashboards = allDashboards;

            // Apply search filter
            const searchTerm = dashboardSearch.value.toLowerCase();
            if (searchTerm) {
                filteredDashboards = filteredDashboards.filter(dash => 
                    dash.name.toLowerCase().includes(searchTerm) ||
                    (dash.description && dash.description.toLowerCase().includes(searchTerm))
                );
            }

            // Apply category filter
            if (currentFilter === 'favorites') {
                filteredDashboards = filteredDashboards.filter(dash => 
                    favoriteDashboards.includes(dash.id)
                );
            } else if (currentFilter === 'recent') {
                filteredDashboards = filteredDashboards.slice(0, 10);
            }

            // Render favorites
            if (favoriteDashboards.length > 0 && currentFilter !== 'recent') {
                document.getElementById('favoritesContainer').classList.remove('hidden');
                const favorites = allDashboards.filter(dash => 
                    favoriteDashboards.includes(dash.id)
                );
                favGrid.innerHTML = favorites.map(dash => createDashboardCard(dash)).join('');
            } else {
                document.getElementById('favoritesContainer').classList.add('hidden');
            }

            // Render all dashboards
            if (filteredDashboards.length > 0) {
                grid.innerHTML = filteredDashboards.map(dash => createDashboardCard(dash)).join('');
            } else {
                grid.innerHTML = '<div class="grid-message grid-message-muted">No dashboards found</div>';
            }
        }

        function createDashboardCard(dashboard) {
            const isFavorite = favoriteDashboards.includes(dashboard.id);
            return `
                <div class="dashboard-card">
                    <div class="dashboard-card-image">
                        ${dashboard.thumbnail ? `<img src="${dashboard.thumbnail}" alt="${dashboard.name}">` : '📊'}
                        ${isFavorite ? '<span class="favorite-badge" onclick="event.stopPropagation(); toggleFavorite(\'${dashboard.id}\')">❤️ Favorite</span>' : ''}
                    </div>
                    <div class="dashboard-card-content">
                        <h4 class="dashboard-card-title">${dashboard.name}</h4>
                        <p class="dashboard-card-description">
                            ${dashboard.description || 'No description provided'}
                        </p>
                        <div class="dashboard-card-footer">
                            <button class="card-action-btn primary" onclick="openDashboard('${dashboard.id}')">
                                Open
                            </button>
                            <button class="card-action-btn secondary" onclick="event.stopPropagation(); toggleFavorite('${dashboard.id}'); return false;">
                                ${isFavorite ? '❤️' : '🤍'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function openDashboard(dashboardId) {
            // Track as viewed
            fetch(`/api/dashboard/${dashboardId}/view`, { method: 'POST' });
            // Open dashboard
            window.location.href = `/dashboard/${dashboardId}`;
        }

        function toggleFavorite(dashboardId) {
            fetch(`/api/dashboard/${dashboardId}/favorite`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ favorite: !favoriteDashboards.includes(dashboardId) })
            }).then(() => {
                const index = favoriteDashboards.indexOf(dashboardId);
                if (index > -1) {
                    favoriteDashboards.splice(index, 1);
                } else {
                    favoriteDashboards.push(dashboardId);
                }
                renderDashboards();
            });
        }

        function showError(message) {
            const grid = document.getElementById('dashboardsGrid');
            grid.innerHTML = `<div class="grid-message grid-message-danger">${message}</div>`;
        }

        // Event listeners
        dashboardSearch.addEventListener('input', renderDashboards);

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                renderDashboards();
            });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            fetchDashboards();
        });
    </script>
</body>

</html>
