<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Dashboard View">
    <title>Dashboard Viewer</title>
    <link rel="shortcut icon" type="image/png" href="../static/favicon.ico">
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/dashboard.css">
    <link rel="stylesheet" href="../static/css/viewer.css">
</head>

<body>
    <div class="page-container">
        <!-- Header -->
        <div class="page-header">
            <div class="header-top">
                <h1 class="header-title">📊 Dashboard Viewer</h1>
                <div class="header-actions">
                    <button class="header-btn secondary" id="favBtn" title="Add to favorites">
                        🤍 Favorite
                    </button>
                    <button class="header-btn secondary" id="themeBtn" title="Toggle dark mode">
                        🌙 Dark
                    </button>
                    <a href="/dashboard-select" class="header-btn">
                        ← Back
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-wrapper">
                <div id="message" class="dashboard-message"></div>

                <div class="dashboard-header" id="dashboardHeader">
                    <h2 class="dashboard-title" id="dashboardTitle">Dashboard</h2>
                    <div class="dashboard-controls">
                        <button class="control-btn secondary" onclick="// Refresh dashboard">
                            🔄 Refresh
                        </button>
                        <button class="control-btn secondary" onclick="// Full screen">
                            ⛶ Fullscreen
                        </button>
                    </div>
                </div>

                <div id="viewer">
                    <div class="loading-spinner" id="loader">
                        <div class="spinner"></div>
                    </div>
                </div>

                <div id="error" class="dashboard-error hidden"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="page-footer">
            <p>&copy; 2024 Professional Dashboard. All rights reserved.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../static/js/jquery-3.4.1.min.js"></script>
    <script src="../static/js/bootstrap.min.js"></script>
    <script>
        const dashboardId = '{{ dashboard_id }}';
        let isFavorite = false;

        // Get dashboard ID from URL
        function getDashboardId() {
            const path = window.location.pathname;
            return path.split('/').pop();
        }

        // Load dashboard
        function loadDashboard() {
            const id = getDashboardId();
            
            // Show loading state
            document.getElementById('dashboardHeader').classList.remove('hidden');
            document.getElementById('loader').classList.remove('hidden');

            // Simulate dashboard loading
            // In production, this would embed the actual Tableau dashboard
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');

                // Create dashboard container
                const viewer = document.getElementById('viewer');
                viewer.innerHTML = `
                    <div class="dashboard-placeholder">
                        <p class="dashboard-placeholder-text">
                            📊 Dashboard ID: ${id}
                        </p>
                        <p class="dashboard-placeholder-desc">
                            Dashboard content would be embedded here via Tableau Server API
                        </p>
                    </div>
                `;

                // Track view
                fetch(`/api/dashboard/${id}/view`, { method: 'POST' });

                // Load favorite status
                loadFavoriteStatus(id);
            }, 1000);
        }

        // Load favorite status
        function loadFavoriteStatus(dashboardId) {
            fetch('/api/dashboards')
                .then(r => r.json())
                .then(data => {
                    if (data.favorites.includes(dashboardId)) {
                        isFavorite = true;
                        document.getElementById('favBtn').textContent = '❤️ Favorite';
                    }
                })
                .catch(err => console.error('Error loading favorites:', err));
        }

        // Theme toggle
        document.getElementById('themeBtn').addEventListener('click', () => {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');

            document.getElementById('themeBtn').textContent = isDark ? '☀️ Light' : '🌙 Dark';

            // Update theme preference
            fetch('/api/user/preferences', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({theme: isDark ? 'dark' : 'light'})
            });
        });

        // Favorite button
        document.getElementById('favBtn').addEventListener('click', () => {
            const id = getDashboardId();
            const newFavStaus = !isFavorite;

            fetch(`/api/dashboard/${id}/favorite`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({favorite: !isFavorite})
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    isFavorite = !isFavorite;
                    document.getElementById('favBtn').textContent = isFavorite ? '❤️ Favorite' : '🤍 Favorite';

                    // Show message
                    const msg = document.getElementById('message');
                    msg.textContent = isFavorite ? 'Added to favorites' : 'Removed from favorites';
                    msg.classList.add('show');
                    setTimeout(() => msg.classList.remove('show'), 3000);
                }
            });
        });

        // Load theme preference
        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').textContent = '☀️ Light';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadDashboard();
        });
    </script>
</body>

</html>
